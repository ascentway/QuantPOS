# ─────────────────────────────────────────────────────────────────────────────
# QuantPOS Monitoring Stack — Prometheus + Grafana
#
# Usage:
#   Start (after main docker-compose is running):
#     docker compose -f docker-compose.monitoring.yml up -d
#
#   Stop:
#     docker compose -f docker-compose.monitoring.yml down
#
# Dashboards:
#   Grafana  → http://localhost:3001   (admin / quantpos_grafana)
#   Prometheus → http://localhost:9090
#
# This compose attaches to the same Docker network as the main compose
# so Prometheus can scrape quantpos-backend:8080/actuator/prometheus
# ─────────────────────────────────────────────────────────────────────────────

name: quantpos-monitoring

services:

  # ─── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: quantpos-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"      # Keep 30 days of metrics
      - "--web.enable-lifecycle"                  # Allows hot config reload via POST /-/reload
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring
      - quantpos_default   # Shared with main compose to reach quantpos-backend

  # ─── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: quantpos-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"       # Using 3001 to avoid conflict with frontend dev server on 3000
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-quantpos_grafana}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "http://localhost:3001"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_LOG_LEVEL:               warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
  # Attach to the main compose network so Prometheus can reach quantpos-backend
  # The network name is {project_name}_default where project_name = folder name "QuantPOS"
  quantpos_default:
    external: true
    name: quantpos_default
